# Roll back to a previous deployment by re-deploying its artifact
# Usage: Actions tab > Rollback Deployment > Run workflow > enter run_id from a prior deploy.yml run
name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the deploy.yml run to roll back to (find in Actions tab URL)'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact from previous run
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
